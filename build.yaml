# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  # Dongle = central, USB to host, runs ZMK Studio.
  # The actual dongle is an nRF52840 SuperMini with a Seeed XIAO bootloader
  # (mounts as "XIAO"), so build it for seeeduino_xiao_ble. The nice_nano_v2
  # variant is kept in case a real nice!nano is used later.
  - board: seeeduino_xiao_ble
    shield: charybdis_dongle
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: charybdis_dongle_xiao
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: reset_xiao
  - board: nice_nano_v2
    shield: charybdis_dongle
    artifact-name: charybdis_dongle
  # Both halves are now peripherals.
  - board: nice_nano_v2
    shield: charybdis_left
    artifact-name: charybdis_left
  - board: nice_nano_v2
    shield: charybdis_right
    artifact-name: charybdis_right
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: reset
