# Dongle = BLE central for two peripherals (left + right halves).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# 2 peripherals + 5 BT host profiles.
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Stronger TX for a reliable link to both halves.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Pointing: the dongle consumes the trackball motion relayed from the right
# half and turns it into HID mouse reports.
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Dongle is USB-powered; keep it awake so the link stays up.
CONFIG_ZMK_SLEEP=n

# This dongle is an nRF52840 SuperMini with XIAO-style power (USB 5V feeds
# the chip's VDDH/internal regulator). Enable the SoC DC/DC converters so the
# regulator doesn't burn 5V->3.3V as heat in a linear drop (root cause of the
# chip overheating with plain nice!nano firmware). The board has the DC/DC
# inductors (the XIAO bootloader uses them and runs cool).
CONFIG_SOC_DCDC_NRF52X=y
CONFIG_SOC_DCDC_NRF52X_HV=y
