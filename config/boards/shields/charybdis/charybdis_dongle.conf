# Dongle = BLE central for two peripherals (left + right halves).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# 2 peripherals + 5 BT host profiles.
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# THE OVERHEATING FIX. This ProMicro / SuperMini nRF52840 clone is high-voltage
# powered (USB 5V -> VDDH -> the chip's internal regulator). With the HV DC/DC
# OFF (the nice_nano_v2 default), that regulator drops 5V->3.3V as a linear LDO
# and burns the difference as heat *inside the SoC*. A sleepy peripheral half
# barely draws current so nobody notices -- but the dongle is an always-on USB
# central, so the LDO cooks the chip. Enabling the high-voltage DC/DC buck fixes
# it. The board has the 10uH HV inductor (proof: it runs cool in the bootloader,
# which enables HV DC/DC).
CONFIG_BOARD_ENABLE_DCDC_HV=y

# Pointing: dongle turns the relayed trackball motion into HID mouse reports.
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Dongle is USB-powered; keep it awake so the link stays up.
CONFIG_ZMK_SLEEP=n
