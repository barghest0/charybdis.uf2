CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_EXT_POWER=y

# badjeff PMW3610 driver (the "-alt" variant on current main).
CONFIG_PMW3610_ALT=y

# nice_nano_v2: external power (sensor VCC) needs time to come up, otherwise
# init fails with "Incorrect product id 0xFF". Give it an extra second.
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000
